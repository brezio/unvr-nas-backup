services:
  unvr-nas-backup:
    image: ghcr.io/ozark-connect/unvr-nas-backup:latest
    build: .
    container_name: unvr-nas-backup
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${SSH_KEY_PATH:-~/.ssh}:/root/.ssh-mount:ro
      - staging:/staging
      - ${ARCHIVE_PATH:?ARCHIVE_PATH is required}:/archive
      # Uncomment to use AWS credentials from host (alternative to env vars)
      # - ${AWS_CONFIG_PATH:-~/.aws}:/root/.aws:ro
    tmpfs:
      - /tmp:size=2G
    healthcheck:
      test: ["CMD", "sh", "-c", "pgrep -x cron && [ -f /tmp/backup-last-success ]"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 120s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  staging:
